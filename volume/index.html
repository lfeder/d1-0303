<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Volume Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5f0; color: #222; font-family: monospace; font-size: 11px; padding: 16px; }
h2 { font-size: 14px; margin-bottom: 4px; }
p.sub { color: #666; font-size: 10px; margin-bottom: 10px; }

.toolbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
.toolbar button {
  padding: 3px 10px; font-size: 10px; font-family: monospace; cursor: pointer;
  border: 1px solid #bbb; border-radius: 3px; background: #fff; color: #444;
}
.toolbar button.active { background: #3a6ea8; color: #fff; border-color: #3a6ea8; }
.toolbar button.active-exch { background: #5a8a5a; color: #fff; border-color: #5a8a5a; }
.toolbar button:hover { border-color: #888; }
.toolbar .sep { width: 1px; height: 18px; background: #ccc; margin: 0 4px; }
.toolbar .label { font-size: 10px; color: #666; margin-right: 2px; }

.legend { display: flex; gap: 12px; margin-bottom: 10px; font-size: 10px; color: #666; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch { width: 14px; height: 12px; border-radius: 2px; border: 1px solid #ccc; }

/* Layout */
.viewer { max-height: calc(100vh - 160px); overflow-y: auto; }

/* Header row with date ticks */
.date-header { display: flex; align-items: flex-end; padding: 0 0 2px 0; border-bottom: 2px solid #bbb; margin-bottom: 0; }
.date-header .col-num { width: 24px; min-width: 24px; }
.date-header .col-exch { width: 40px; min-width: 40px; }
.date-header .col-sym { width: 56px; min-width: 56px; }
.date-header .col-avg { width: 52px; min-width: 52px; }
.date-header .col-bar { flex: 1; position: relative; height: 16px; }
.date-tick { position: absolute; bottom: 0; font-size: 9px; color: #888; border-left: 1px solid #ccc; padding-left: 2px; white-space: nowrap; }

/* Rows */
.vol-row { display: flex; align-items: center; height: 16px; border-bottom: 1px solid #e8e8e2; }
.vol-row:hover { background: #eeeee8; }
.vol-row .col-num { width: 24px; min-width: 24px; font-size: 9px; padding: 0 2px 0 4px; color: #999; text-align: right; }
.vol-row .col-exch { width: 40px; min-width: 40px; font-size: 10px; padding: 0 4px; color: #666; }
.vol-row .col-sym { width: 56px; min-width: 56px; font-size: 10px; padding: 0 4px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
.vol-row .col-avg { width: 52px; min-width: 52px; font-size: 9px; padding: 0 4px; text-align: right; color: #444; }
.vol-row .col-bar { flex: 1; height: 14px; position: relative; cursor: crosshair; }
.vol-row .col-bar canvas { width: 100%; height: 100%; display: block; }

.vol-row.exch-summary { background: #e0e0d8; font-weight: bold; height: 18px; }
.vol-row.exch-summary:hover { background: #d4d4cc; }
.vol-row.exch-summary .col-sym { font-size: 11px; }
.vol-row.section-hdr { background: #d8dce4; font-weight: bold; height: 18px; justify-content: center; font-size: 10px; }

/* Tooltip */
.bar-tip { display: none; position: fixed; background: #333; color: #fff; padding: 4px 8px; border-radius: 3px; font-size: 10px; white-space: nowrap; z-index: 100; pointer-events: none; font-family: monospace; }

#loading { text-align: center; padding: 40px; color: #888; font-size: 13px; }

</style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
<h2 style="font-size:14px">Daily Volume Viewer</h2>
<div style="font-size:10px;font-family:monospace;color:#222">v: 03-24 20:46</div>
</div>
<p class="sub">Daily perpetual-swap volume (quote USD) by exchange &amp; coin &nbsp;|&nbsp; Mar 2025 – Mar 2026</p>

<div class="toolbar">
  <span class="label">Rank:</span>
  <button class="rank-btn active" data-rank="2" onclick="setRank('2')">#2</button>
  <button class="rank-btn" data-rank="3" onclick="setRank('3')">#3</button>
  <button class="rank-btn" data-rank="4" onclick="setRank('4')">#4</button>
  <button class="rank-btn" data-rank="5" onclick="setRank('5')">#5</button>
  <button class="rank-btn" data-rank="6" onclick="setRank('6')">#6</button>
  <div class="sep"></div>
  <span class="label">Exchange:</span>
  <button class="exch-btn" data-ex="binance" onclick="setExch('binance')">BN</button>
  <button class="exch-btn" data-ex="bybit" onclick="setExch('bybit')">BB</button>
  <button class="exch-btn" data-ex="okx" onclick="setExch('okx')">OKX</button>
  <button class="exch-btn" data-ex="hyperliquid" onclick="setExch('hyperliquid')">HL</button>
  <button class="exch-btn" data-ex="aster" onclick="setExch('aster')">AS</button>
  <button class="exch-btn" data-ex="lighter" onclick="setExch('lighter')">LT</button>
  <div class="sep"></div>
  <span class="label">Period:</span>
  <button class="range-btn" data-range="30" onclick="setRange(30)">30d</button>
  <button class="range-btn" data-range="90" onclick="setRange(90)">90d</button>
  <button class="range-btn active" data-range="0" onclick="setRange(0)">All</button>
  <div class="sep"></div>
  <span id="status" style="font-size:10px;color:#666"></span>
  <div class="sep"></div>
  <button onclick="savePng()" style="border-color:#888">Save PNG</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#eeeee8"></div> No data</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgb(200,100,100)"></div> &lt;$1M</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgb(220,200,80)"></div> $1–10M</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgb(124,196,124)"></div> $10–100M</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgb(26,122,26)"></div> &gt;$100M</div>
</div>

<div id="loading">Loading volume.json…</div>
<div id="viewer" class="viewer" style="display:none">
  <div class="date-header" id="dateHeader">
    <div class="col-num">#</div>
    <div class="col-exch">Ex</div>
    <div class="col-sym">Coin</div>
    <div class="col-avg">Avg</div>
    <div class="col-bar" id="dateTickBar"></div>
  </div>
  <div id="rows"></div>
</div>
<div class="bar-tip" id="tip"></div>

<script>
let DATA = null;
let rankFilter = '2';
let exchFilter = null;
let dateRange = 0; // 0 = all

const EXCH_ABBR = { binance: 'BN', bybit: 'BB', okx: 'OKX', hyperliquid: 'HL', aster: 'AS', lighter: 'LT' };

function fmtVol(v) {
  if (!v) return '';
  if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
  return String(Math.round(v));
}
function fmtFull(v) {
  if (!v) return '$0';
  return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 0 });
}

// Coin-level thresholds: returns [r,g,b]
function volRgb(v) {
  if (!v) return null;
  if (v >= 1e8) return [26, 122, 26];
  if (v >= 1e7) return [124, 196, 124];
  if (v >= 1e6) return [220, 200, 80];
  return [200, 100, 100];
}
// Summary-level thresholds (billions): returns [r,g,b]
function sumRgb(v) {
  if (!v) return null;
  if (v >= 25e9) return [26, 122, 26];
  if (v >= 5e9) return [124, 196, 124];
  if (v >= 1e9) return [220, 200, 80];
  return [200, 100, 100];
}

function setRank(r) {
  rankFilter = r; exchFilter = null;
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.toggle('active', b.dataset.rank === r));
  document.querySelectorAll('.exch-btn').forEach(b => b.classList.remove('active-exch'));
  render();
}
function setExch(ex) {
  exchFilter = ex; rankFilter = null;
  document.querySelectorAll('.exch-btn').forEach(b => b.classList.toggle('active-exch', b.dataset.ex === ex));
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
  render();
}
function setRange(days) {
  dateRange = days;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.range) === days));
  render();
}

function avgSlice(vols, start, end) {
  let sum = 0, count = 0;
  for (let i = start; i < end; i++) { if (vols[i]) { sum += vols[i]; count++; } }
  return count ? sum / count : 0;
}

function paintBar(canvas, vols, start, end, colorFn) {
  const fn = colorFn || volRgb;
  const len = end - start;
  canvas.width = len;
  canvas.height = 1;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(len, 1);
  for (let i = 0; i < len; i++) {
    const rgb = fn(vols[start + i]);
    const off = i * 4;
    if (rgb) {
      img.data[off] = rgb[0]; img.data[off+1] = rgb[1]; img.data[off+2] = rgb[2]; img.data[off+3] = 255;
    } else {
      img.data[off] = 238; img.data[off+1] = 238; img.data[off+2] = 232; img.data[off+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

const tip = document.getElementById('tip');
function barMove(e, visibleDates, vols, start) {
  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const idx = Math.floor(x / rect.width * visibleDates.length);
  if (idx < 0 || idx >= visibleDates.length) { tip.style.display = 'none'; return; }
  tip.textContent = `${visibleDates[idx]}: ${fmtFull(vols[start + idx])}`;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - 24) + 'px';
}
function barLeave() { tip.style.display = 'none'; }

function savePng() {
  if (!DATA || !DATA._lastRender) return;
  const { summaryRows: sRows, coinRows: cRows, start, end, mode } = DATA._lastRender;
  const dates = DATA.dates;
  const nVis = end - start;

  const ROW_H = 10, HDR_H = 16, SEP_H = 12;
  const COL_NUM = 28, COL_EX = 32, COL_SYM = 58, COL_AVG = 50;
  const LEFT = COL_NUM + COL_EX + COL_SYM + COL_AVG;
  const BAR_W = Math.max(nVis * 2, 400);
  const W = LEFT + BAR_W + 4;
  const TITLE_H = 20;
  const totalRows = sRows.length + 1 + cRows.length;
  const H = TITLE_H + HDR_H + totalRows * ROW_H + SEP_H + 4;

  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f5f5f0'; ctx.fillRect(0, 0, W, H);
  ctx.font = '10px monospace';

  // Title
  ctx.fillStyle = '#222'; ctx.font = 'bold 12px monospace';
  ctx.fillText(`Daily Volume · ${mode}`, 4, 13);
  ctx.font = '10px monospace';
  let y = TITLE_H;

  // Date header
  ctx.fillStyle = '#e8e8e2'; ctx.fillRect(0, y, W, HDR_H);
  ctx.fillStyle = '#444'; ctx.font = 'bold 9px monospace';
  ctx.fillText('#', 4, y + 11);
  ctx.fillText('Ex', COL_NUM + 2, y + 11);
  ctx.fillText('Coin', COL_NUM + COL_EX + 2, y + 11);
  ctx.fillText('Avg', COL_NUM + COL_EX + COL_SYM + 2, y + 11);
  const tickStep = Math.max(1, Math.floor(nVis / 20));
  for (let i = 0; i < nVis; i += tickStep) {
    const x = LEFT + (i / nVis) * BAR_W;
    ctx.fillStyle = '#ccc'; ctx.fillRect(x, y, 1, HDR_H);
    ctx.fillStyle = '#888';
    ctx.fillText(dates[start + i].slice(5), x + 2, y + 11);
  }
  y += HDR_H;
  ctx.font = '9px monospace';

  function drawBar(yPos, vols, colorFn) {
    const pw = BAR_W / nVis;
    for (let i = 0; i < nVis; i++) {
      const rgb = colorFn(vols[start + i]);
      ctx.fillStyle = rgb ? `rgb(${rgb[0]},${rgb[1]},${rgb[2]})` : '#eeeee8';
      ctx.fillRect(LEFT + i * pw, yPos, Math.ceil(pw), ROW_H - 1);
    }
  }

  // Summary rows
  for (const sr of sRows) {
    ctx.fillStyle = '#e0e0d8'; ctx.fillRect(0, y, LEFT, ROW_H);
    ctx.fillStyle = '#222'; ctx.font = 'bold 9px monospace';
    ctx.fillText(sr.label, COL_NUM + 2, y + 8);
    ctx.fillText(fmtVol(sr.avg), COL_NUM + COL_EX + COL_SYM + 2, y + 8);
    ctx.font = '9px monospace';
    drawBar(y, sr.vols, sumRgb);
    y += ROW_H;
  }

  // Separator
  ctx.fillStyle = '#d8dce4'; ctx.fillRect(0, y, W, SEP_H);
  ctx.fillStyle = '#222'; ctx.font = 'bold 9px monospace';
  ctx.fillText('Coins', COL_NUM + COL_EX + 2, y + 9);
  ctx.font = '9px monospace';
  y += SEP_H;

  // Coin rows
  for (let i = 0; i < cRows.length; i++) {
    const r = cRows[i];
    const bg = i % 2 ? '#f0f0eb' : '#fafaf5';
    ctx.fillStyle = bg; ctx.fillRect(0, y, LEFT, ROW_H);
    ctx.fillStyle = '#999'; ctx.fillText(String(i + 1), 4, y + 8);
    ctx.fillStyle = '#666'; ctx.fillText(EXCH_ABBR[r.ex] || r.ex, COL_NUM + 2, y + 8);
    ctx.fillStyle = '#222'; ctx.font = 'bold 9px monospace';
    ctx.fillText(r.symbol, COL_NUM + COL_EX + 2, y + 8);
    ctx.font = '9px monospace';
    ctx.fillStyle = '#444'; ctx.fillText(fmtVol(r.avg), COL_NUM + COL_EX + COL_SYM + 2, y + 8);
    drawBar(y, r.vols, volRgb);
    y += ROW_H;
  }

  // Download
  const a = document.createElement('a');
  a.download = `volume-${mode.replace(/[^a-zA-Z0-9]/g, '')}-${dates[start]}_${dates[end-1]}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}

function render() {
  if (!DATA) return;
  const { dates, exchanges, exchDaily, coins } = DATA;
  const totalN = dates.length;

  // Date range slicing
  const end = totalN;
  const start = dateRange ? Math.max(0, end - dateRange) : 0;
  const visibleDates = dates.slice(start, end);
  const nVis = visibleDates.length;

  // Rank each coin's exchanges by full-period avg (stable ranking)
  // Cache rankings
  if (!DATA._ranks) {
    DATA._ranks = {};
    for (const coin of coins) {
      const ranked = [];
      for (const e of Object.keys(coin.e)) {
        ranked.push({ e, avg: avgSlice(coin.e[e], 0, totalN) });
      }
      ranked.sort((a, b) => b.avg - a.avg);
      DATA._ranks[coin.s] = ranked;
    }
  }

  // Build one row per coin
  const rows = [];
  for (const coin of coins) {
    let ex, vols;
    if (exchFilter) {
      if (!coin.e[exchFilter]) continue;
      ex = exchFilter;
      vols = coin.e[exchFilter];
    } else {
      const ranked = DATA._ranks[coin.s];
      const idx = parseInt(rankFilter) - 1;
      if (idx >= ranked.length) continue;
      ex = ranked[idx].e;
      vols = coin.e[ex];
    }
    const avg = avgSlice(vols, start, end);
    rows.push({ symbol: coin.s, ex, vols, avg });
  }
  rows.sort((a, b) => b.avg - a.avg);

  // Summary bars: always 6 rows
  // Exchange mode: one row per exchange total
  // Rank mode: one row per rank (#1-#6), each = aggregated daily vol for that rank
  let summaryRows;
  if (exchFilter) {
    summaryRows = exchanges.map(ex => ({
      label: EXCH_ABBR[ex] || ex,
      vols: exchDaily[ex],
    }));
    summaryRows.sort((a, b) => avgSlice(b.vols, start, end) - avgSlice(a.vols, start, end));
  } else {
    summaryRows = [];
    for (let rank = 1; rank <= 6; rank++) {
      const rankVols = new Array(totalN).fill(0);
      for (const coin of coins) {
        const ranked = DATA._ranks[coin.s];
        if (rank > ranked.length) continue;
        const ex = ranked[rank - 1].e;
        const vols = coin.e[ex];
        for (let i = 0; i < totalN; i++) rankVols[i] += (vols[i] || 0);
      }
      summaryRows.push({ label: `#${rank}`, vols: rankVols });
    }
  }

  const mode = exchFilter ? (EXCH_ABBR[exchFilter] || exchFilter) : `rank #${rankFilter}`;
  document.getElementById('status').textContent = `${rows.length} coins · ${mode} · ${nVis}d`;

  // Store for PNG export
  const srWithAvg = summaryRows.map(sr => ({ ...sr, avg: avgSlice(sr.vols, start, end) }));
  DATA._lastRender = { summaryRows: srWithAvg, coinRows: rows, start, end, mode };

  // Date ticks
  const tickBar = document.getElementById('dateTickBar');
  tickBar.innerHTML = '';
  const step = Math.max(1, Math.floor(nVis / 26));
  for (let i = 0; i < nVis; i += step) {
    const pct = (i / nVis * 100).toFixed(2);
    const tick = document.createElement('div');
    tick.className = 'date-tick';
    tick.style.left = pct + '%';
    tick.textContent = visibleDates[i].slice(5);
    tickBar.appendChild(tick);
  }

  // Build rows
  const container = document.getElementById('rows');
  container.innerHTML = '';

  // Summary rows
  for (const sr of summaryRows) {
    const avg = avgSlice(sr.vols, start, end);
    const row = document.createElement('div');
    row.className = 'vol-row exch-summary';
    row.innerHTML = `<div class="col-num"></div><div class="col-exch">${sr.label}</div><div class="col-sym"></div><div class="col-avg" title="${fmtFull(avg)}/day">${fmtVol(avg)}</div><div class="col-bar"><canvas style="image-rendering:pixelated"></canvas></div>`;
    container.appendChild(row);
    paintBar(row.querySelector('canvas'), sr.vols, start, end, sumRgb);
    const barDiv = row.querySelector('.col-bar');
    barDiv.addEventListener('mousemove', e => barMove(e, visibleDates, sr.vols, start));
    barDiv.addEventListener('mouseleave', barLeave);
  }

  // Separator
  const sep = document.createElement('div');
  sep.className = 'vol-row section-hdr';
  sep.innerHTML = `<div class="col-num"></div><div style="padding:0 4px">Coins</div>`;
  container.appendChild(sep);

  // Coin rows
  for (let ri = 0; ri < rows.length; ri++) { const r = rows[ri];
    const row = document.createElement('div');
    row.className = 'vol-row';
    row.innerHTML = `<div class="col-num">${ri + 1}</div><div class="col-exch">${EXCH_ABBR[r.ex] || r.ex}</div><div class="col-sym" title="${r.symbol}">${r.symbol}</div><div class="col-avg" title="${fmtFull(r.avg)}/day">${fmtVol(r.avg)}</div><div class="col-bar"><canvas style="image-rendering:pixelated"></canvas></div>`;
    container.appendChild(row);
    paintBar(row.querySelector('canvas'), r.vols, start, end);
    const barDiv = row.querySelector('.col-bar');
    barDiv.addEventListener('mousemove', e => barMove(e, visibleDates, r.vols, start));
    barDiv.addEventListener('mouseleave', barLeave);
  }
}

fetch('volume.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('viewer').style.display = 'block';
    render();
  })
  .catch(e => {
    document.getElementById('loading').textContent = 'Error: ' + e.message;
  });
</script>
</body>
</html>
