<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Volume Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5f0; color: #222; font-family: monospace; font-size: 11px; padding: 16px; }
h2 { font-size: 14px; margin-bottom: 4px; }
p.sub { color: #666; font-size: 10px; margin-bottom: 10px; }

.toolbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
.toolbar button {
  padding: 3px 10px; font-size: 10px; font-family: monospace; cursor: pointer;
  border: 1px solid #bbb; border-radius: 3px; background: #fff; color: #444;
}
.toolbar button.active { background: #3a6ea8; color: #fff; border-color: #3a6ea8; }
.toolbar button.active-exch { background: #5a8a5a; color: #fff; border-color: #5a8a5a; }
.toolbar button:hover { border-color: #888; }
.toolbar .sep { width: 1px; height: 18px; background: #ccc; margin: 0 4px; }
.toolbar .label { font-size: 10px; color: #666; margin-right: 2px; }

.legend { display: flex; gap: 12px; margin-bottom: 10px; font-size: 10px; color: #666; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch { width: 14px; height: 12px; border-radius: 2px; border: 1px solid #ccc; }

/* Table */
.vol-wrap { overflow: auto; max-height: calc(100vh - 160px); }
table.vol { border-collapse: separate; border-spacing: 0; font-size: 10px; }
table.vol th, table.vol td { padding: 2px 4px; white-space: nowrap; border-right: 1px solid #e0e0d8; border-bottom: 1px solid #e0e0d8; }
table.vol thead th { position: sticky; top: 0; z-index: 10; background: #e8e8e2; font-weight: bold; font-size: 9px; color: #444; }

/* Pinned columns */
table.vol .pin-exch { position: sticky; left: 0; z-index: 5; min-width: 40px; }
table.vol .pin-sym { position: sticky; left: 40px; z-index: 5; min-width: 56px; font-weight: bold; }
table.vol .pin-avg { position: sticky; left: 96px; z-index: 5; min-width: 52px; text-align: right; }
table.vol thead .pin-exch, table.vol thead .pin-sym, table.vol thead .pin-avg { z-index: 15; }

/* Row types */
tr.exch-summary td { background: #e0e0d8; font-weight: bold; font-size: 11px; }
tr.exch-summary:hover td { background: #d4d4cc; }
tr.section-hdr td { background: #d8dce4; font-weight: bold; font-size: 10px; padding: 4px; }
tr.coin-row { background: #fafaf5; }
tr.coin-row:nth-child(even of .coin-row) { background: #f0f0eb; }
tr.coin-row:hover td { background: #eeeee8 !important; }

/* Volume cells */
.vc { text-align: right; font-size: 9px; min-width: 42px; }
.vc-zero { color: #ccc; }

#loading { text-align: center; padding: 40px; color: #888; font-size: 13px; }
</style>
</head>
<body>

<div style="font-size:10px;font-family:monospace;color:#222;margin-bottom:4px">v: 03-24 07:40pm</div>
<h2>Daily Volume Viewer</h2>
<p class="sub">Daily perpetual-swap volume (quote USD) by exchange &amp; coin &nbsp;|&nbsp; Mar 2025 – Mar 2026</p>

<div class="toolbar">
  <span class="label">Rank:</span>
  <button class="rank-btn active" data-rank="1" onclick="setRank('1')">#1</button>
  <button class="rank-btn" data-rank="2" onclick="setRank('2')">#2</button>
  <button class="rank-btn" data-rank="3" onclick="setRank('3')">#3</button>
  <button class="rank-btn" data-rank="4" onclick="setRank('4')">#4</button>
  <button class="rank-btn" data-rank="5" onclick="setRank('5')">#5</button>
  <button class="rank-btn" data-rank="6" onclick="setRank('6')">#6</button>
  <div class="sep"></div>
  <span class="label">Exchange:</span>
  <button class="exch-btn" data-ex="binance" onclick="setExch('binance')">BN</button>
  <button class="exch-btn" data-ex="bybit" onclick="setExch('bybit')">BB</button>
  <button class="exch-btn" data-ex="okx" onclick="setExch('okx')">OKX</button>
  <button class="exch-btn" data-ex="hyperliquid" onclick="setExch('hyperliquid')">HL</button>
  <button class="exch-btn" data-ex="aster" onclick="setExch('aster')">AS</button>
  <button class="exch-btn" data-ex="lighter" onclick="setExch('lighter')">LT</button>
  <div class="sep"></div>
  <span class="label">Range:</span>
  <button class="range-btn active" data-range="30" onclick="setRange(30)">30d</button>
  <button class="range-btn" data-range="90" onclick="setRange(90)">90d</button>
  <button class="range-btn" data-range="0" onclick="setRange(0)">All</button>
  <div class="sep"></div>
  <button id="btn-multi" class="active" onclick="toggleMulti()">2+ exch only</button>
  <div class="sep"></div>
  <span id="status" style="font-size:10px;color:#666"></span>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#f5f5f0"></div> No data</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#e8f0e4"></div> Low</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#7bc47b"></div> Mid</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#1a7a1a"></div> High</div>
</div>

<div id="loading">Loading volume.json…</div>
<div class="vol-wrap" id="volWrap" style="display:none">
  <table class="vol" id="volTable"></table>
</div>

<script>
let DATA = null;
let rankFilter = '1';   // '1'-'6' or null when in exchange mode
let exchFilter = null;   // exchange name or null when in rank mode
let multiExchOnly = true;
let dateRange = 30;      // 30, 90, or 0 (all)

const EXCH_ABBR = { binance: 'BN', bybit: 'BB', okx: 'OKX', hyperliquid: 'HL', aster: 'AS', lighter: 'LT' };

// ── Formatting ──
function fmtVol(v) {
  if (!v) return '';
  if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
  return String(Math.round(v));
}

function fmtFull(v) {
  if (!v) return '$0';
  return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 0 });
}

// ── Color (log green) ──
function volBg(v, maxLog) {
  if (!v) return '';
  const ratio = Math.log10(v + 1) / maxLog;
  const c = Math.max(0, Math.min(1, ratio));
  return `rgb(${Math.round(245 - c * 219)},${Math.round(245 - c * 123)},${Math.round(240 - c * 214)})`;
}

// ── Toolbar actions ──
function setRank(r) {
  rankFilter = r; exchFilter = null;
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.toggle('active', b.dataset.rank === r));
  document.querySelectorAll('.exch-btn').forEach(b => b.classList.remove('active-exch'));
  render();
}

function setExch(ex) {
  exchFilter = ex; rankFilter = null;
  document.querySelectorAll('.exch-btn').forEach(b => b.classList.toggle('active-exch', b.dataset.ex === ex));
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
  render();
}

function setRange(days) {
  dateRange = days;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.range) === days));
  render();
}

function toggleMulti() {
  multiExchOnly = !multiExchOnly;
  document.getElementById('btn-multi').classList.toggle('active', multiExchOnly);
  render();
}

// ── Compute visible date slice ──
function getDateSlice() {
  const allDates = DATA.dates;
  if (!dateRange) return { start: 0, end: allDates.length };
  const end = allDates.length;
  const start = Math.max(0, end - dateRange);
  return { start, end };
}

// ── Average volume for a coin on an exchange over visible period ──
function avgVol(vols, start, end) {
  let sum = 0, count = 0;
  for (let i = start; i < end; i++) {
    if (vols[i]) { sum += vols[i]; count++; }
  }
  return count ? sum / count : 0;
}

// ── Render ──
function render() {
  if (!DATA) return;
  const { dates, exchanges, exchDaily, coins } = DATA;
  const { start, end } = getDateSlice();
  const nDates = end - start;

  // Filter coins
  let filtered = coins;
  if (multiExchOnly) filtered = filtered.filter(c => Object.keys(c.e).length >= 2);

  // Build one row per coin
  const rows = [];
  for (const coin of filtered) {
    let ex, vols;
    if (exchFilter) {
      // Direct exchange mode: skip coins not on this exchange
      if (!coin.e[exchFilter]) continue;
      ex = exchFilter;
      vols = coin.e[exchFilter];
    } else {
      // Rank mode: rank exchanges by avg vol in visible period, pick Nth
      const ranked = [];
      for (const e of Object.keys(coin.e)) {
        ranked.push({ e, avg: avgVol(coin.e[e], start, end) });
      }
      ranked.sort((a, b) => b.avg - a.avg);
      const idx = parseInt(rankFilter) - 1;
      if (idx >= ranked.length) continue;
      ex = ranked[idx].e;
      vols = coin.e[ex];
    }
    const avg = avgVol(vols, start, end);
    rows.push({ symbol: coin.s, ex, vols, avg });
  }

  // Sort by avg volume descending
  rows.sort((a, b) => b.avg - a.avg);

  // Status
  const mode = exchFilter ? (EXCH_ABBR[exchFilter] || exchFilter) : `rank #${rankFilter}`;
  document.getElementById('status').textContent = `${rows.length} coins · ${mode} · ${nDates}d`;

  // Color scales
  const exchVals = exchanges.flatMap(ex => exchDaily[ex].slice(start, end)).filter(v => v > 0);
  const maxLogExch = Math.log10(Math.max(...exchVals, 1) + 1);
  const coinVals = rows.flatMap(r => r.vols.slice(start, end)).filter(v => v > 0);
  const maxLogCoin = Math.log10(Math.max(...coinVals, 1) + 1);

  // Date ticks (every ~14 days)
  const tickStep = Math.max(1, Math.floor(nDates / 26));
  const tickSet = new Set();
  for (let i = 0; i < nDates; i += tickStep) tickSet.add(i);

  // Build table HTML
  let h = '<thead><tr>';
  h += '<th class="pin-exch">Ex</th><th class="pin-sym">Coin</th><th class="pin-avg">Avg</th>';
  for (let i = 0; i < nDates; i++) {
    h += `<th>${tickSet.has(i) ? dates[start + i].slice(5) : ''}</th>`;
  }
  h += '</tr></thead><tbody>';

  // Exchange summary
  for (const ex of exchanges) {
    const vols = exchDaily[ex];
    let total = 0;
    for (let i = start; i < end; i++) total += vols[i];
    const a = total / nDates;
    h += `<tr class="exch-summary"><td class="pin-exch" style="background:#e0e0d8">${EXCH_ABBR[ex] || ex}</td>`;
    h += `<td class="pin-sym" style="background:#e0e0d8"></td>`;
    h += `<td class="pin-avg" style="background:#e0e0d8" title="${fmtFull(a)}/day">${fmtVol(a)}</td>`;
    for (let i = start; i < end; i++) {
      const v = vols[i];
      const bg = volBg(v, maxLogExch);
      h += `<td class="vc${v ? '' : ' vc-zero'}" style="${bg ? 'background:' + bg : ''}" title="${dates[i]}: ${fmtFull(v)}">${fmtVol(v)}</td>`;
    }
    h += '</tr>';
  }

  // Separator
  h += `<tr class="section-hdr"><td class="pin-exch" style="background:#d8dce4"></td><td class="pin-sym" style="background:#d8dce4">Coins</td><td class="pin-avg" style="background:#d8dce4"></td>`;
  for (let i = 0; i < nDates; i++) h += '<td style="background:#d8dce4"></td>';
  h += '</tr>';

  // Coin rows
  for (const row of rows) {
    h += '<tr class="coin-row">';
    h += `<td class="pin-exch" style="background:inherit">${EXCH_ABBR[row.ex] || row.ex}</td>`;
    h += `<td class="pin-sym" style="background:inherit">${row.symbol}</td>`;
    h += `<td class="pin-avg" style="background:inherit" title="${fmtFull(row.avg)}/day">${fmtVol(row.avg)}</td>`;
    for (let i = start; i < end; i++) {
      const v = row.vols[i];
      const bg = volBg(v, maxLogCoin);
      h += `<td class="vc${v ? '' : ' vc-zero'}" style="${bg ? 'background:' + bg : ''}" title="${dates[i]}: ${fmtFull(v)}">${fmtVol(v)}</td>`;
    }
    h += '</tr>';
  }

  h += '</tbody>';
  document.getElementById('volTable').innerHTML = h;
}

// ── Load ──
fetch('volume.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('volWrap').style.display = 'block';
    render();
  })
  .catch(e => {
    document.getElementById('loading').textContent = 'Error: ' + e.message;
  });
</script>
</body>
</html>
